name: Daily Hanmed News Crawl

on:
  schedule:
    - cron: '30 22 * * *'  # 07:30 KST (UTC 22:30 = KST 07:30)
  workflow_dispatch:        # 수동 실행 가능

jobs:
  crawl-and-publish:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # docs/ 변경사항 push를 위해 필요

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Hanmed News Crawler
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python hanmed_crawler.py
        # 크롤러가 없거나 실패해도 계속 진행 (integrator가 빈 섹션으로 처리)
        continue-on-error: true

      - name: Run Kin Crawler (지식인 건강 질문)
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: |
          python kin_crawler.py
        continue-on-error: true

      - name: Run Integrator (HTML 생성 + Slack 알림)
        env:
          SLACK_USER_TOKEN: ${{ secrets.SLACK_USER_TOKEN }}
          BITLY_TOKEN: ${{ secrets.BITLY_TOKEN }}
          GITHUB_PAGES_URL: https://sejongkim-ctrl.github.io/hanmed-news-monitor
          # soo-kin-monitor Pro JSON은 별도 레포에서 생성되므로 GitHub Actions에서는 없을 수 있음
          # KIN_OUTPUT_DIR은 기본값(빈 경로)으로 두어 자동 스킵
        run: |
          python integrator.py

      - name: Commit and push docs/ changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          # 변경사항 없으면 commit 스킵
          git diff --staged --quiet || git commit -m "chore: daily update $(date -u '+%Y-%m-%d')"
          git push
